<div class="gastos-container">
  
  <div class="header-main">
    <div class="title-group">
      <h1>🛒 Gastos Variables</h1>
      <h2 class="subtitle">Periodo: {{ nombreMesActual() }} {{ anioSeleccionado() }}</h2>
    </div>
    
    <div class="actions">
      <button class="btn-toggle-orange" (click)="mostrarFormulario.set(!mostrarFormulario())">
        {{ mostrarFormulario() ? '✕ Cancelar' : '+ Registrar Gasto' }}
      </button>
    </div>
  </div>

  <div class="period-selector-bar">
    <span class="label">Cambiar mes:</span>
    <div class="controls">
      <select [(ngModel)]="mesSeleccionado" (change)="onFechaChange()" class="modern-select">
        <option [value]="1">Enero</option>
        <option [value]="2">Febrero</option>
        <option [value]="3">Marzo</option>
        <option [value]="4">Abril</option>
        <option [value]="5">Mayo</option>
        <option [value]="6">Junio</option>
        <option [value]="7">Julio</option>
        <option [value]="8">Agosto</option>
        <option [value]="9">Septiembre</option>
        <option [value]="10">Octubre</option>
        <option [value]="11">Noviembre</option>
        <option [value]="12">Diciembre</option>
      </select>

      <select [(ngModel)]="anioSeleccionado" (change)="onFechaChange()" class="modern-select">
        <option [value]="2024">2024</option>
        <option [value]="2025">2025</option>
        <option [value]="2026">2026</option>
      </select>
    </div>
  </div>

  <div class="card-table">
    <table class="modern-table">
      <tbody>
        @for (gasto of listaGastos(); track gasto.id) {
          } @empty {
          <tr>
            <td colspan="4" class="empty-msg">No hay gastos variables registrados en {{ nombreMesActual() }}.</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
