<div class="fijos-container">
  <div class="header-actions">
    <div class="title-section">
      <h2>🏠 Gastos Fijos</h2>
      <button class="btn-toggle-red" (click)="mostrarFormulario.set(!mostrarFormulario())">
        {{ mostrarFormulario() ? '✕ Cancelar' : '+ Añadir Gasto Fijo' }}
      </button>
    </div>
    
    <div class="filters">
      <select [(ngModel)]="mesSeleccionado" (change)="onFechaChange()">
        <option [value]="1">Enero</option>
        <option [value]="2">Febrero</option>
        <option [value]="3">Marzo</option>
        </select>
      <select [(ngModel)]="anioSeleccionado" (change)="onFechaChange()">
        <option [value]="2025">2025</option>
        <option [value]="2026">2026</option>
      </select>
    </div>
  </div>

  @if (mostrarFormulario()) {
    <div class="form-card-red animate-in">
      <div class="form-grid">
        <div class="input-group">
          <label>Nombre (Concepto)</label>
          <input type="text" [(ngModel)]="nuevoFijo.nombre" placeholder="Ej: Alquiler, Gym...">
        </div>
        <div class="input-group">
          <label>Importe Mensual</label>
          <input type="number" [(ngModel)]="nuevoFijo.cantidad" placeholder="0.00">
        </div>
        <div class="input-group">
          <label>Fecha de Inicio</label>
          <input type="date" [(ngModel)]="nuevoFijo.fechaInicio">
        </div>
        <button class="btn-save-red" (click)="guardarFijo()">✓ Guardar</button>
      </div>
    </div>
  }

  <div class="card">
    <table class="modern-table">
      <thead>
        <tr>
          <th>Concepto</th>
          <th>Fecha Inicio</th>
          <th class="text-right">Cantidad</th>
        </tr>
      </thead>
      <tbody>
        @for (item of listaFijos(); track item.id) {
          <tr>
            <td><strong>{{ item.nombre }}</strong></td>
            <td>{{ item.fechaInicio }}</td>
            <td class="text-right text-red">-{{ item.cantidad | currency:'EUR' }}</td>
          </tr>
        } @empty {
          <tr><td colspan="3" class="empty-msg">No hay gastos fijos este mes.</td></tr>
        }
      </tbody>
    </table>
  </div>
</div>
