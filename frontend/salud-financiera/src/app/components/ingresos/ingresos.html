<h3>Ingresos</h3>
<form (ngSubmit)="addIngreso()">
  <input type="number" [(ngModel)]="nuevoIngreso.cantidad" name="cantidad" placeholder="Cantidad" required />
  <input type="text" [(ngModel)]="nuevoIngreso.descripcion" name="descripcion" placeholder="Descripción" />
  <button type="submit">Añadir ingreso</button>
</form>

<ul>
  <li *ngFor="let ingreso of ingresosList">
    {{ ingreso.cantidad }} € - {{ ingreso.descripcion }}
  </li>
</ul>
