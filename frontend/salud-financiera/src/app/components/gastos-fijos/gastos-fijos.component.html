<h2>Gastos Fijos</h2>
<input [(ngModel)]="descripcion" placeholder="Nombre del gasto" />
<input type="number" [(ngModel)]="cantidad" placeholder="Cantidad" />
<button (click)="agregarGastoFijo()">Añadir gasto fijo</button>

<ul>
  <li *ngFor="let g of gastosFijosService.getGastosFijos()()">
    {{ g.descripcion }} - {{ g.cantidad }}
  </li>
</ul>
