<h3>Gastos Fijos</h3>
<form (ngSubmit)="addGastoFijo()">
  <input type="number" [(ngModel)]="nuevoGastoFijo.cantidad" name="cantidad" placeholder="Cantidad" required />
  <input type="text" [(ngModel)]="nuevoGastoFijo.descripcion" name="descripcion" placeholder="Descripción" />
  <button type="submit">Añadir gasto fijo</button>
</form>

<ul>
  <li *ngFor="let gasto of gastosFijosList">
    {{ gasto.cantidad }} € - {{ gasto.descripcion }}
  </li>
</ul>
