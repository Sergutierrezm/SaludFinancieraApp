<h3>Gastos</h3>
<form (ngSubmit)="addGasto()">
  <input type="number" [(ngModel)]="nuevoGasto.cantidad" name="cantidad" placeholder="Cantidad" required />
  <input type="text" [(ngModel)]="nuevoGasto.descripcion" name="descripcion" placeholder="Descripción" />
  <button type="submit">Añadir gasto</button>
</form>

<ul>
  <li *ngFor="let gasto of gastosList">
    {{ gasto.cantidad }} € - {{ gasto.descripcion }}
  </li>
</ul>
