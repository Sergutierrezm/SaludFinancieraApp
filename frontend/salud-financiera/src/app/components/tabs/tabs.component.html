<mat-tab-group>
  <mat-tab *ngFor="let tab of tabs" [label]="tab.title">
    <app-dashboard [month]="tab.month" [year]="tab.year"></app-dashboard>
    <app-ingresos [month]="tab.month" [year]="tab.year"></app-ingresos>
    <app-gastos [month]="tab.month" [year]="tab.year"></app-gastos>
    <app-gastos-fijos [month]="tab.month" [year]="tab.year"></app-gastos-fijos>
  </mat-tab>
</mat-tab-group>

<button (click)="addMonthTab()">Añadir mes</button>
